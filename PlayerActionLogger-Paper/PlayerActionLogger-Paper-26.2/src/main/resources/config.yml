web-interface:
  enabled: true
  port: 8080
  # Keep this on localhost unless you add firewall/reverse-proxy protection.
  bind-address: "127.0.0.1"
  # Optional simple token for the local dashboard. Leave blank for no token.
  # If set, the browser will prompt for it and send it as X-PlayerLogger-Token.
  access-token: ""

logging:
  include-chat: true
  include-commands: true
  include-ip-addresses: false
  max-search-results-per-file: 100

  # Username logs stay readable, while UUIDs are stored separately in:
  # plugins/PlayerActionLogger/logs/players/_uuid-index.csv
  include-uuid-in-player-log-lines: false

  # Raw BlockFromToEvent logging is extremely noisy when water/lava spreads.
  # Player moderation is usually better served by BUCKET_EMPTY/BUCKET_FILL logs,
  # which stay enabled through normal player events.
  fluid-flow:
    enabled: false
    # If enabled, aggregate summarizes by world/material/chunk instead of writing every flow block.
    aggregate: true
    aggregate-interval-seconds: 30
