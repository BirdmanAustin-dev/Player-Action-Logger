web-interface:
  enabled: true

  # Choose any unused TCP port from 1 through 65535.
  # Common examples: 8080, 8081, 8888, or 9090.
  # Restart the server after changing this value.
  port: 8080

  # 127.0.0.1 keeps the dashboard available only on the server itself.
  # Use 0.0.0.0 only when you intentionally want other devices on the network
  # to connect, and protect the dashboard with a token and firewall rules.
  bind-address: "127.0.0.1"

  # Optional simple token for the dashboard. Leave blank for no token.
  access-token: ""

logging:
  include-chat: true
  include-commands: true
  include-ip-addresses: false
  max-search-results-per-file: 100

  # Username logs stay readable, while UUIDs are stored separately in:
  # plugins/PlayerActionLogger/logs/players/_uuid-index.csv
  include-uuid-in-player-log-lines: false

  # Inventory logging focuses on movement involving storage containers. Normal
  # player-inventory clicks are ignored by default because ordinary gameplay
  # creates large amounts of low-value inventory noise.
  inventory:
    container-actions-only: true
    include-player-inventory-clicks: false

  # Optional player-log retention. Disabled by default so no evidence is deleted.
  # When enabled, timestamped lines older than the selected number of days are
  # removed from logs/players/<username>.log. UUID, server, and combat files are
  # not deleted by this setting. Legacy or malformed lines are preserved.
  retention:
    enabled: false
    days: 7
    run-interval-hours: 24

  # Raw BlockFromToEvent logging is extremely noisy when water/lava spreads.
  # Player bucket actions and environmental damage context remain logged.
  fluid-flow:
    enabled: false
    aggregate: true
    aggregate-interval-seconds: 30

combat:
  enabled: true

  # PvP hits within this gap are grouped into the same incident.
  incident-timeout-seconds: 20

  # After a PvP death, the incident remains open briefly to associate nearby
  # pickups and possible item returns with the death timeline.
  post-death-loot-seconds: 45
  post-death-loot-radius-blocks: 12.0

  # Spawn-kill review remains evidence-based. The plugin distinguishes a victim
  # who is still near respawn from a victim who left and returned to the prior fight.
  spawn-review-seconds: 20
  respawn-return-tracking-seconds: 90
  respawn-radius-blocks: 16.0
  return-to-fight-radius-blocks: 24.0

  # Repeated kills by the same attacker/victim pair are noted for review.
  repeated-kill-window-seconds: 300

  # Recent water/lava/fire actions may be shown as possible environmental
  # context. These entries are evidence for later review, not an automatic verdict.
  environmental-attribution-seconds: 20
  environmental-attribution-radius-blocks: 12.0

  pve:
    enabled: true
    # False keeps ordinary pig/cow/sheep damage out of the logs by default.
    log-passive-mobs: false

activity:
  enabled: true
  # Dashboard activity summaries use only this rolling in-memory window.
  # The underlying block, inventory, crafting, combat, and other actions remain
  # in the normal username log files.
  window-minutes: 60
  idle-minutes: 10

  # Cap only the in-memory dashboard events. The full text logs are unaffected.
  max-events-per-player: 5000

  # Exploration is sampled rather than counting every visited chunk. Both the
  # time and chunk-distance thresholds must be reached before another travel
  # checkpoint is recorded. Exploration cannot override meaningful work unless
  # the player has done very little else in the current window.
  exploration:
    enabled: true
    minimum-seconds-between-events: 45
    minimum-chunk-distance: 4
    classification-minimum-events: 4
    breakdown-weight-cap: 8

  # Lightweight heatmap substitute: rank active chunks rather than generate a map.
  active-areas-limit: 10
  active-area-min-score: 6



moderation-alerts:
  # Alerts are written to moderation-alerts.json and remain OPEN until a dashboard
  # administrator closes them. Closing stores only OPEN/CLOSED status; no reviewer
  # name, note, or closure time is retained. Closed alerts leave the active queue
  # and are removed after the underlying signal has remained quiet for this period.
  reopen-after-quiet-minutes: 15

moderation-actions:
  # Enables kick, permanent ban, temporary ban, and pardon controls in the dashboard.
  enabled: true

  # Strongly recommended. When true, moderation actions and history deletion are
  # disabled unless web-interface.access-token contains a non-empty token.
  require-access-token: true

  default-temporary-ban-minutes: 60
  maximum-temporary-ban-minutes: 43200

# Destructive dashboard controls. These still require the dashboard access token
# when moderation-actions.require-access-token is true.
dashboard:
  feed-bucket-minutes: 5
  feed-limit: 60
  profile-feed-limit: 20
  alert-limit: 40
  history:
    allow-day-deletion: true
